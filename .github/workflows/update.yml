name: Update prices

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 13 * * *'  # 12:30 UTC = after EPEX publishes tomorrow's prices (14:30 CET)
    - cron: '30 12 * * *'  # 12:30 UTC = after EPEX publishes tomorrow's prices (14:30 CEST)
    - cron: '0 5 * * *'    # 05:00 UTC = morning catch-up run
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python3 -m src.cli update

      - name: Commit data and output to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          if git diff --staged --quiet; then
            echo "No new raw data – skipping commit"
            exit 0
          fi
          git add output/
          git commit -m "chore: update prices $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy output/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
